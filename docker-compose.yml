version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: wled-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: wled_database
    volumes:
      - mongodb_data:/data/db
    networks:
      - wled-network

  mongo-express:
    image: mongo-express:latest
    container_name: wled-mongo-express
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongodb
    networks:
      - wled-network

volumes:
  mongodb_data:
    driver: local

networks:
  wled-network:
    driver: bridge
