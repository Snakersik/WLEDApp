name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Backend URL (e.g. http://192.168.10.42:8002)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-${{ hashFiles('frontend/yarn.lock', 'frontend/package.json') }}
          restore-keys: node-modules-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('frontend/yarn.lock') }}
          restore-keys: gradle-

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile || yarn install

      - name: Create .env file
        working-directory: frontend
        env:
          BACKEND_URL: ${{ github.event.inputs.backend_url || vars.BACKEND_URL || 'http://192.168.10.42:8002' }}
        run: echo "EXPO_PUBLIC_BACKEND_URL=$BACKEND_URL" > .env

      - name: Expo Prebuild (Android only)
        working-directory: frontend
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: frontend/android
        env:
          EXPO_PUBLIC_BACKEND_URL: ${{ github.event.inputs.backend_url || vars.BACKEND_URL || 'http://192.168.10.42:8002' }}
          NODE_ENV: production
        run: ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: techion-light-${{ github.run_number }}
          path: frontend/android/app/build/outputs/apk/release/*.apk
          retention-days: 14
