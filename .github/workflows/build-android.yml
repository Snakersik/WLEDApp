name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Backend URL (e.g. http://192.168.10.42:8002)'
        required: false
        default: 'http://192.168.10.42:8002'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Expo Prebuild (Android only)
        working-directory: frontend
        env:
          EXPO_PUBLIC_BACKEND_URL: ${{ github.event.inputs.backend_url }}
        run: npx expo prebuild --platform android --clean --no-install

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: frontend/android
        env:
          EXPO_PUBLIC_BACKEND_URL: ${{ github.event.inputs.backend_url }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: techion-light-${{ github.run_number }}
          path: frontend/android/app/build/outputs/apk/release/*.apk
          retention-days: 14
