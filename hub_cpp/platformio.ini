[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    fastled/FastLED@^3.6.0
    ottowinter/ESPAsyncWebServer-esphome@^3.1.0
    bblanchon/ArduinoJson@^7.0.0
    h2zero/NimBLE-Arduino@^1.4.2
board_build.filesystem = littlefs
monitor_speed = 115200
upload_port = COM4
monitor_port = COM4
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM=0
